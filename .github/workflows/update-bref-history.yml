name: Update Brewers B-Ref History

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Optional single year to scrape, like 2026. Leave blank for 1969-2026."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update-bref-history:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          if [ -z "${{ github.event.inputs.year }}" ]; then
            python scripts/brewers_bref_history.py
          else
            python scripts/brewers_bref_history.py --year "${{ github.event.inputs.year }}"
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/all_batting_seasons.csv data/all_pitching_seasons.csv
          git commit -m "Update Brewers B-Ref history data" || echo "No changes to commit"
          git push
